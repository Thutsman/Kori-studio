<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/jpeg" href="logo.jpeg" />
  <link rel="apple-touch-icon" href="logo.jpeg" />
  <title>Köri Menu CMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #FAF6F0;
      color: #2F3D1C;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Gate ────────────────────────────────────────────────── */
    #gate {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #FAF6F0;
      padding: 1.5rem;
    }
    .gate-card {
      background: #fff;
      border: 1px solid rgba(74,95,42,0.15);
      border-radius: 4px;
      padding: 2.5rem 2.25rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 4px 24px rgba(47,61,28,0.06);
      text-align: center;
    }
    .gate-logo {
      font-family: 'Cinzel', Georgia, serif;
      font-size: 1rem;
      letter-spacing: 0.18em;
      color: #2F3D1C;
      margin-bottom: 0.35rem;
    }
    .gate-sub {
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(74,95,42,0.5);
      margin-bottom: 2rem;
    }
    .gate-card input[type="email"],
    .gate-card input[type="password"] {
      width: 100%;
      padding: 0.7rem 1rem;
      border: 1px solid rgba(74,95,42,0.25);
      border-radius: 3px;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 0.9rem;
      color: #2F3D1C;
      background: #FAF6F0;
      outline: none;
      margin-bottom: 0.75rem;
      transition: border-color 0.2s;
    }
    .gate-card input[type="email"]:focus,
    .gate-card input[type="password"]:focus { border-color: #4A5F2A; }
    .gate-card button.gate-btn {
      width: 100%;
      padding: 0.75rem;
      background: #4A5F2A;
      color: #FAF6F0;
      border: none;
      border-radius: 3px;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }
    .gate-card button.gate-btn:hover { background: #3A4A22; }
    .gate-error {
      font-size: 0.78rem;
      color: #c0392b;
      margin-bottom: 0.75rem;
      min-height: 1.1em;
    }

    /* ── Admin panel ─────────────────────────────────────────── */
    #admin { display: none; min-height: 100vh; flex-direction: column; }

    /* Header */
    .admin-header {
      background: #2F3D1C;
      color: #FAF6F0;
      padding: 0 1.5rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .admin-header h1 {
      font-family: 'Cinzel', Georgia, serif;
      font-size: 1rem;
      letter-spacing: 0.15em;
      margin: 0;
      font-weight: 500;
    }
    .logout-btn {
      background: rgba(250,246,240,0.12);
      color: #FAF6F0;
      border: 1px solid rgba(250,246,240,0.2);
      padding: 0.4rem 0.9rem;
      border-radius: 3px;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 500;
      transition: background 0.2s;
    }
    .logout-btn:hover { background: rgba(250,246,240,0.2); }

    /* Tabs */
    .cat-tabs {
      background: #fff;
      border-bottom: 1px solid rgba(74,95,42,0.12);
      padding: 0 1.5rem;
      display: flex;
      gap: 0;
      overflow-x: auto;
      scrollbar-width: none;
      flex-shrink: 0;
    }
    .cat-tabs::-webkit-scrollbar { display: none; }
    .cat-tab {
      padding: 0.9rem 1.1rem;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(47,61,28,0.45);
      border-bottom: 2px solid transparent;
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.2s, border-color 0.2s;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
      font-family: 'Inter', system-ui, sans-serif;
    }
    .cat-tab:hover { color: #4A5F2A; }
    .cat-tab.active { background: #4A5F2A; color: #FAF6F0; border-bottom-color: #4A5F2A; }

    /* Content area */
    .admin-content {
      flex: 1;
      padding: 1.75rem 1.5rem;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
    }

    .content-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }
    .content-header h2 {
      font-family: 'Cinzel', Georgia, serif;
      font-size: 1.1rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      margin: 0;
      color: #2F3D1C;
    }
    .add-btn {
      background: #4A5F2A;
      color: #FAF6F0;
      border: none;
      padding: 0.55rem 1.1rem;
      border-radius: 3px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      cursor: pointer;
      font-family: 'Inter', system-ui, sans-serif;
      transition: background 0.2s;
    }
    .add-btn:hover { background: #3A4A22; }

    /* Table */
    .table-wrap {
      background: #fff;
      border: 1px solid rgba(74,95,42,0.12);
      border-radius: 4px;
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.83rem;
    }
    thead th {
      background: #F5F0E6;
      padding: 0.7rem 1rem;
      text-align: left;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(47,61,28,0.55);
      border-bottom: 1px solid rgba(74,95,42,0.1);
    }
    tbody tr { border-bottom: 1px solid rgba(74,95,42,0.07); }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(74,95,42,0.025); }
    tbody td { padding: 0.75rem 1rem; vertical-align: middle; color: #2F3D1C; }
    td.td-name { font-weight: 500; max-width: 200px; }
    td.td-desc { color: rgba(47,61,28,0.55); font-size: 0.78rem; max-width: 260px; }
    td.td-price { font-family: 'Cinzel', Georgia, serif; white-space: nowrap; }
    td.td-actions { white-space: nowrap; }

    /* Toggle switch */
    .toggle-wrap { display: flex; align-items: center; }
    .toggle {
      position: relative;
      display: inline-block;
      width: 38px;
      height: 22px;
      flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #ccc;
      border-radius: 22px;
      transition: background 0.25s;
    }
    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      top: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.25s;
    }
    .toggle input:checked + .toggle-slider { background: #4A5F2A; }
    .toggle input:checked + .toggle-slider::before { transform: translateX(16px); }

    /* Action buttons */
    .action-btn {
      padding: 0.35rem 0.7rem;
      border-radius: 3px;
      font-size: 0.7rem;
      font-weight: 500;
      cursor: pointer;
      font-family: 'Inter', system-ui, sans-serif;
      border: 1px solid transparent;
      transition: all 0.15s;
      letter-spacing: 0.05em;
    }
    .edit-btn {
      background: rgba(74,95,42,0.08);
      color: #4A5F2A;
      border-color: rgba(74,95,42,0.2);
      margin-right: 0.4rem;
    }
    .edit-btn:hover { background: #4A5F2A; color: #FAF6F0; }
    .delete-btn {
      background: rgba(192,57,43,0.07);
      color: #c0392b;
      border-color: rgba(192,57,43,0.2);
    }
    .delete-btn:hover { background: #c0392b; color: #fff; }

    /* Inline delete confirm */
    .delete-confirm {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.7rem;
    }
    .delete-confirm span { color: rgba(47,61,28,0.65); }
    .dc-cancel {
      padding: 0.3rem 0.6rem;
      border-radius: 3px;
      border: 1px solid rgba(74,95,42,0.2);
      background: none;
      color: #4A5F2A;
      font-size: 0.7rem;
      cursor: pointer;
      font-family: 'Inter', system-ui, sans-serif;
    }
    .dc-cancel:hover { background: rgba(74,95,42,0.07); }
    .dc-confirm {
      padding: 0.3rem 0.6rem;
      border-radius: 3px;
      border: 1px solid rgba(192,57,43,0.3);
      background: #c0392b;
      color: #fff;
      font-size: 0.7rem;
      cursor: pointer;
      font-family: 'Inter', system-ui, sans-serif;
    }
    .dc-confirm:hover { background: #a93226; }

    /* Spinner */
    .spinner-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(74,95,42,0.15);
      border-top-color: #4A5F2A;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Empty */
    .empty-state {
      text-align: center;
      padding: 3rem;
      color: rgba(47,61,28,0.4);
      font-size: 0.85rem;
    }

    /* ── Modal ────────────────────────────────────────────────── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(30,36,24,0.65);
      backdrop-filter: blur(3px);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    #modal-overlay.open { display: flex; }
    .modal {
      background: #fff;
      border-radius: 5px;
      width: 100%;
      max-width: 560px;
      max-height: 92vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid rgba(74,95,42,0.12);
    }
    .modal-header h3 {
      font-family: 'Cinzel', Georgia, serif;
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      margin: 0;
      color: #2F3D1C;
    }
    .modal-close {
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(47,61,28,0.4);
      border-radius: 3px;
      transition: color 0.2s, background 0.2s;
    }
    .modal-close:hover { color: #2F3D1C; background: rgba(74,95,42,0.07); }
    .modal-body { padding: 1.5rem; }
    .form-row { margin-bottom: 1.1rem; }
    .form-row label {
      display: block;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(47,61,28,0.6);
      margin-bottom: 0.4rem;
    }
    .form-row input[type="text"],
    .form-row input[type="number"],
    .form-row textarea,
    .form-row select {
      width: 100%;
      padding: 0.6rem 0.85rem;
      border: 1px solid rgba(74,95,42,0.22);
      border-radius: 3px;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 0.85rem;
      color: #2F3D1C;
      background: #FAF6F0;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-row input:focus,
    .form-row textarea:focus,
    .form-row select:focus { border-color: #4A5F2A; }
    .form-row textarea { resize: vertical; min-height: 72px; }
    .form-row-check {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1.1rem;
    }
    .form-row-check input[type="checkbox"] {
      width: 16px; height: 16px;
      accent-color: #4A5F2A;
      cursor: pointer;
    }
    .form-row-check label {
      font-size: 0.82rem;
      font-weight: 500;
      color: #2F3D1C;
      cursor: pointer;
    }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 1rem; }
    .modal-footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 0.75rem;
      padding: 1.1rem 1.5rem;
      border-top: 1px solid rgba(74,95,42,0.1);
      background: #FAF6F0;
      border-radius: 0 0 5px 5px;
    }
    .cancel-btn {
      padding: 0.6rem 1.1rem;
      border-radius: 3px;
      border: 1px solid rgba(74,95,42,0.22);
      background: none;
      color: #4A5F2A;
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      font-family: 'Inter', system-ui, sans-serif;
      transition: background 0.15s;
    }
    .cancel-btn:hover { background: rgba(74,95,42,0.06); }
    .save-btn {
      padding: 0.6rem 1.3rem;
      border-radius: 3px;
      border: none;
      background: #4A5F2A;
      color: #FAF6F0;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      cursor: pointer;
      font-family: 'Inter', system-ui, sans-serif;
      transition: background 0.15s;
    }
    .save-btn:hover { background: #3A4A22; }
    .save-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ── Toasts ──────────────────────────────────────────────── */
    #toast-container {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 200;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      pointer-events: none;
    }
    .toast {
      pointer-events: auto;
      padding: 0.75rem 1.1rem;
      border-radius: 4px;
      font-size: 0.82rem;
      font-weight: 500;
      color: #fff;
      box-shadow: 0 4px 16px rgba(0,0,0,0.18);
      animation: toast-in 0.25s ease;
      max-width: 320px;
      line-height: 1.4;
    }
    .toast.success { background: #2F6B3A; }
    .toast.error { background: #c0392b; }
    @keyframes toast-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .toast.out { animation: toast-out 0.25s ease forwards; }
    @keyframes toast-out {
      to { opacity: 0; transform: translateY(8px); }
    }

    /* ── Orders view ─────────────────────────────────────── */
    .status-badge {
      display: inline-block;
      padding: 0.2rem 0.55rem;
      border-radius: 999px;
      font-size: 0.64rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .status-new       { background: rgba(217,119,6,0.12);   color: #B45309; }
    .status-confirmed { background: rgba(139,92,246,0.12);  color: #7C3AED; }
    .status-preparing { background: rgba(37,99,235,0.1);    color: #1D4ED8; }
    .status-ready     { background: rgba(22,163,74,0.12);   color: #15803D; }
    .status-collected { background: rgba(107,114,128,0.12); color: #4B5563; }
    .status-cancelled { background: rgba(192,57,43,0.1);    color: #c0392b; }

    .status-action-btn {
      padding: 0.28rem 0.65rem;
      border-radius: 3px;
      font-size: 0.68rem;
      font-weight: 500;
      cursor: pointer;
      font-family: 'Inter', system-ui, sans-serif;
      border: 1px solid rgba(74,95,42,0.25);
      background: rgba(74,95,42,0.07);
      color: #4A5F2A;
      transition: all 0.15s;
      white-space: nowrap;
      margin-right: 0.3rem;
    }
    .status-action-btn:hover { background: #4A5F2A; color: #FAF6F0; border-color: #4A5F2A; }
    .status-action-cancel {
      border-color: rgba(192,57,43,0.2);
      background: rgba(192,57,43,0.06);
      color: #c0392b;
    }
    .status-action-cancel:hover { background: #c0392b; color: #fff; border-color: #c0392b; }

    .order-items-cell { font-size: 0.75rem; color: rgba(47,61,28,0.6); max-width: 200px; }
    .orders-refresh-note { font-size: 0.72rem; color: rgba(47,61,28,0.4); }

    /* ── Analytics bar ──────────────────────────────────────── */
    .analytics-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }
    @media (max-width: 640px) { .analytics-bar { grid-template-columns: repeat(2, 1fr); } }
    .analytics-card {
      background: #fff;
      border: 1px solid rgba(74,95,42,0.12);
      border-radius: 4px;
      padding: 0.85rem 1rem;
    }
    .analytics-label {
      font-size: 0.61rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(47,61,28,0.45);
      margin-bottom: 0.3rem;
    }
    .analytics-value {
      font-family: 'Cinzel', Georgia, serif;
      font-size: 1.45rem;
      color: #2F3D1C;
      font-weight: 500;
    }
    .analytics-value.green { color: #15803D; }

    /* ── Orders toolbar ─────────────────────────────────────── */
    .orders-toolbar { display: flex; flex-direction: column; gap: 0.65rem; margin-bottom: 1.1rem; }
    .order-search-input {
      width: 100%;
      padding: 0.58rem 1rem;
      border: 1px solid rgba(74,95,42,0.22);
      border-radius: 3px;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 0.85rem;
      color: #2F3D1C;
      background: #fff;
      outline: none;
      transition: border-color 0.2s;
    }
    .order-search-input:focus { border-color: #4A5F2A; }
    .status-filter-tabs { display: flex; gap: 0.3rem; flex-wrap: wrap; }
    .status-filter-tab {
      padding: 0.28rem 0.7rem;
      border-radius: 999px;
      font-size: 0.64rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: 1px solid rgba(74,95,42,0.2);
      background: none;
      color: rgba(47,61,28,0.5);
      cursor: pointer;
      font-family: 'Inter', system-ui, sans-serif;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .status-filter-tab:hover { color: #4A5F2A; border-color: rgba(74,95,42,0.45); }
    .status-filter-tab.active { background: #4A5F2A; color: #FAF6F0; border-color: #4A5F2A; }

    /* ── Realtime indicator ─────────────────────────────────── */
    .live-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #22c55e;
      margin-right: 0.35rem;
      vertical-align: middle;
      animation: livepulse 2s infinite;
    }
    @keyframes livepulse { 0%,100%{opacity:1} 50%{opacity:0.35} }
    .live-label { font-size: 0.72rem; color: #22c55e; font-weight: 600; vertical-align: middle; }
    .wa-notify-btn {
      display: inline-flex; align-items: center; gap: 0.3rem;
      padding: 0.26rem 0.6rem;
      border-radius: 3px;
      font-size: 0.67rem;
      font-weight: 500;
      cursor: pointer;
      font-family: 'Inter', system-ui, sans-serif;
      border: 1px solid rgba(37,211,102,0.35);
      background: rgba(37,211,102,0.08);
      color: #128C7E;
      transition: all 0.15s;
      white-space: nowrap;
      margin-right: 0.3rem;
    }
    .wa-notify-btn:hover { background: #25D366; color: #fff; border-color: #25D366; }

    /* ── Orders: desktop table scrolls, mobile shows cards ──── */
    #orders-wrap { overflow: visible; background: none; border: none; }
    .orders-table-inner { overflow-x: auto; -webkit-overflow-scrolling: touch; background: #fff; border: 1px solid rgba(74,95,42,0.12); border-radius: 4px; }
    .orders-table-inner table { min-width: 720px; }
    .orders-mobile { display: none; }
    @media (max-width: 699px) {
      .orders-desktop { display: none; }
      .orders-mobile  { display: block; }
    }
    .order-card {
      background: #fff;
      border: 1px solid rgba(74,95,42,0.12);
      border-radius: 4px;
      padding: 0.85rem 0.95rem;
      margin-bottom: 0.55rem;
    }
    .order-card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 0.5rem;
      margin-bottom: 0.3rem;
    }
    .order-card-name { font-weight: 600; font-size: 0.88rem; }
    .order-card-ref  { font-family: 'Cinzel', serif; font-size: 0.67rem; color: rgba(47,61,28,0.45); margin-top: 0.08rem; }
    .order-card-meta { font-size: 0.71rem; color: rgba(47,61,28,0.5); margin-bottom: 0.35rem; line-height: 1.5; }
    .order-card-items { font-size: 0.74rem; color: rgba(47,61,28,0.55); margin-bottom: 0.5rem; border-top: 1px solid rgba(74,95,42,0.08); padding-top: 0.4rem; }
    .order-card-footer { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.4rem; }
    .order-card-total { font-family: 'Cinzel', serif; font-size: 0.92rem; font-weight: 500; }
    .order-card-actions { display: flex; gap: 0.3rem; flex-wrap: wrap; }

    /* ── Menu items table: mobile column hiding ────────────── */
    #items-wrap { overflow-x: auto; }
    @media (max-width: 699px) {
      .col-mobile-hide { display: none; }
      #items-wrap td.td-desc,
      #items-wrap td.td-price { display: none; }
    }

    /* ── Photo upload ───────────────────────────────────────── */
    .item-thumb { width:36px; height:36px; object-fit:cover; border-radius:3px; margin-right:0.45rem; vertical-align:middle; display:inline-block; flex-shrink:0; }
    .photo-upload-zone {
      border: 1.5px dashed rgba(74,95,42,0.28);
      border-radius: 3px;
      padding: 1.1rem 1rem;
      text-align: center;
      color: rgba(47,61,28,0.38);
      font-size: 0.78rem;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, color 0.2s;
      user-select: none;
    }
    .photo-upload-zone:hover { border-color: #4A5F2A; background: rgba(74,95,42,0.03); color: #4A5F2A; }
    .photo-preview-img {
      width: 100%; height: 160px; object-fit: cover;
      border-radius: 3px; display: block;
      border: 1px solid rgba(74,95,42,0.12);
      margin-bottom: 0.5rem;
    }
    .photo-actions { display: flex; gap: 0.5rem; }
  </style>
</head>
<body>

  <!-- ── Password Gate ─────────────────────────────────────────────────── -->
  <div id="gate">
    <div class="gate-card">
      <p class="gate-logo">Köri Studio</p>
      <p class="gate-sub">Menu Admin</p>
      <div class="gate-error" id="gate-error"></div>
      <input type="email" id="gate-email" placeholder="Email" autocomplete="email" />
      <input type="password" id="gate-pw" placeholder="Password" autocomplete="current-password" />
      <button class="gate-btn" id="gate-submit">Sign In</button>
    </div>
  </div>

  <!-- ── Admin Panel ────────────────────────────────────────────────────── -->
  <div id="admin" style="display:none; flex-direction:column; min-height:100vh;">

    <header class="admin-header">
      <h1>Köri Menu CMS</h1>
      <button class="logout-btn" id="logout-btn">Logout</button>
    </header>

    <div class="cat-tabs" id="cat-tabs">
      <div class="spinner-wrap" style="padding:0.7rem 1.5rem;">
        <div class="spinner" style="width:18px;height:18px;border-width:2px;border-color:rgba(74,95,42,0.15);border-top-color:#4A5F2A;"></div>
      </div>
    </div>

    <div class="admin-content">
      <!-- Menu items panel -->
      <div id="menu-panel">
        <div class="content-header">
          <h2 id="section-title">Items</h2>
          <button class="add-btn" id="add-item-btn">+ Add Item</button>
        </div>
        <div class="table-wrap" id="items-wrap">
          <div class="spinner-wrap"><div class="spinner"></div></div>
        </div>
      </div>
      <!-- Orders panel -->
      <div id="orders-panel" style="display:none;">
        <!-- Analytics bar -->
        <div class="analytics-bar">
          <div class="analytics-card">
            <div class="analytics-label">Today's Orders</div>
            <div class="analytics-value" id="stat-today">—</div>
          </div>
          <div class="analytics-card">
            <div class="analytics-label">Revenue (Collected)</div>
            <div class="analytics-value green" id="stat-revenue">—</div>
          </div>
          <div class="analytics-card">
            <div class="analytics-label">Active Now</div>
            <div class="analytics-value" id="stat-active">—</div>
          </div>
          <div class="analytics-card">
            <div class="analytics-label">Ready to Collect</div>
            <div class="analytics-value green" id="stat-ready">—</div>
          </div>
        </div>
        <!-- Search & status filter -->
        <div class="orders-toolbar">
          <input type="text" id="order-search" class="order-search-input" placeholder="Search by name or order #…" />
          <div class="status-filter-tabs" id="status-filter-tabs">
            <button class="status-filter-tab active" data-filter="">All</button>
            <button class="status-filter-tab" data-filter="new">New</button>
            <button class="status-filter-tab" data-filter="confirmed">Confirmed</button>
            <button class="status-filter-tab" data-filter="preparing">Preparing</button>
            <button class="status-filter-tab" data-filter="ready">Ready</button>
            <button class="status-filter-tab" data-filter="collected">Collected</button>
            <button class="status-filter-tab" data-filter="cancelled">Cancelled</button>
          </div>
        </div>
        <div class="content-header" style="margin-top:0;">
          <h2>Live Orders</h2>
          <span><span class="live-dot"></span><span class="live-label">Live</span></span>
        </div>
        <div class="table-wrap" id="orders-wrap">
          <div class="spinner-wrap"><div class="spinner"></div></div>
        </div>
      </div>
    </div>

  </div>

  <!-- ── Modal ─────────────────────────────────────────────────────────── -->
  <div id="modal-overlay">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-header">
        <h3 id="modal-title">Add Item</h3>
        <button class="modal-close" id="modal-close-btn" aria-label="Close">
          <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <form id="item-form" novalidate>
          <input type="hidden" id="f-id" />
          <div class="form-row">
            <label for="f-name">Name *</label>
            <input type="text" id="f-name" required placeholder="Item name" />
          </div>
          <div class="form-row">
            <label for="f-desc">Description</label>
            <textarea id="f-desc" placeholder="Short description"></textarea>
          </div>
          <div class="form-grid">
            <div class="form-row">
              <label for="f-price">Price (USD)</label>
              <input type="number" id="f-price" step="0.01" min="0" placeholder="0.00" />
            </div>
            <div class="form-row">
              <label for="f-sort">Sort Order</label>
              <input type="number" id="f-sort" placeholder="0" />
            </div>
          </div>
          <div class="form-row">
            <label for="f-display-type">Display Type</label>
            <select id="f-display-type">
              <option value="standard">Standard</option>
              <option value="compact">Compact</option>
              <option value="pill">Pill</option>
              <option value="pill_display">Pill Display</option>
            </select>
          </div>
          <div class="form-row">
            <label for="f-pill-group">Pill Group</label>
            <input type="text" id="f-pill-group" placeholder="e.g. Tea, Milkshakes — leave blank for individual items" />
          </div>
          <div class="form-row">
            <label for="f-subcategory">Subcategory</label>
            <input type="text" id="f-subcategory" placeholder="e.g. sides, hot, tea, iced — leave blank for main items" />
          </div>
          <div class="form-row-check">
            <input type="checkbox" id="f-available" checked />
            <label for="f-available">Available</label>
          </div>
          <div class="form-row">
            <label>Photo</label>
            <div id="photo-wrap"></div>
            <input type="file" id="f-photo" accept="image/jpeg,image/png,image/webp" style="display:none" />
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="cancel-btn" id="modal-cancel-btn">Cancel</button>
        <button class="save-btn" id="modal-save-btn">Save Item</button>
      </div>
    </div>
  </div>

  <!-- ── Toast container ───────────────────────────────────────────────── -->
  <div id="toast-container"></div>

  <script>
  (function () {
    var SUPABASE_URL = 'https://rwmlrwjkyqrnwlfkzuoo.supabase.co';
    var SUPABASE_KEY = 'sb_publishable_hBno_sYLVnpvGodRxaPFJA_RkcJjfSC';

    var sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    // Public client — always uses anon key, never sends an auth JWT.
    // kori_menu_categories and kori_menu_items have anon SELECT policies (for the public menu).
    // After signing in, sb sends an authenticated JWT; rows from anon-only policies are
    // invisible to authenticated users. sbPublic bypasses that for safe public reads.
    var sbPublic = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth: {
        persistSession: false,
        autoRefreshToken: false,
        detectSessionInUrl: false,
        storageKey: 'kori-public-anon'
      }
    });

    /* ── Utilities ─────────────────────────────────────── */
    function esc(str) {
      if (str == null) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function toast(msg, type) {
      var container = document.getElementById('toast-container');
      var el = document.createElement('div');
      el.className = 'toast ' + (type || 'success');
      el.textContent = msg;
      container.appendChild(el);
      setTimeout(function () {
        el.classList.add('out');
        setTimeout(function () { el.remove(); }, 280);
      }, 3000);
    }

    /* ── Gate ──────────────────────────────────────────── */
    var gate = document.getElementById('gate');
    var admin = document.getElementById('admin');
    var gateEmail = document.getElementById('gate-email');
    var gatePw = document.getElementById('gate-pw');
    var gateErr = document.getElementById('gate-error');
    var gateSubmit = document.getElementById('gate-submit');

    function showAdmin() {
      gate.style.display = 'none';
      admin.style.display = 'flex';
      init();
    }

    function showGate() {
      admin.style.display = 'none';
      gate.style.display = 'flex';
      gatePw.value = '';
      gateErr.textContent = '';
      gateSubmit.disabled = false;
      gateSubmit.textContent = 'Sign In';
    }

    // Restore session if Supabase still has a valid auth token
    sb.auth.getSession().then(function (result) {
      if (result.data && result.data.session) {
        showAdmin();
      }
    });

    gateSubmit.addEventListener('click', async function () {
      var email = gateEmail.value.trim();
      var password = gatePw.value;
      if (!email || !password) {
        gateErr.textContent = 'Enter your email and password.';
        return;
      }
      gateErr.textContent = '';
      gateSubmit.disabled = true;
      gateSubmit.textContent = 'Signing in…';

      var result = await sb.auth.signInWithPassword({ email: email, password: password });
      if (result.error) {
        gateErr.textContent = result.error.message || 'Incorrect credentials. Try again.';
        gatePw.value = '';
        gatePw.focus();
        gateSubmit.disabled = false;
        gateSubmit.textContent = 'Sign In';
      } else {
        showAdmin();
      }
    });

    gatePw.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') gateSubmit.click();
    });
    gateEmail.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') gatePw.focus();
    });

    document.getElementById('logout-btn').addEventListener('click', async function () {
      await sb.auth.signOut();
      showGate();
    });

    /* ── State ─────────────────────────────────────────── */
    var categories = [];
    var currentCatSlug = null;
    var currentItems = [];
    var ordersInterval = null;
    var ordersChannel = null;
    var allOrders = [];
    var orderStatusFilter = '';
    var orderSearch = '';

    /* ── Init ──────────────────────────────────────────── */
    function init() {
      loadCategories();
    }

    /* ── Categories ────────────────────────────────────── */
    async function loadCategories() {
      var tabsEl = document.getElementById('cat-tabs');
      tabsEl.innerHTML = '<div class="spinner-wrap" style="padding:0.7rem 1.5rem;"><div class="spinner" style="width:18px;height:18px;border-width:2px;border-color:rgba(74,95,42,0.15);border-top-color:#4A5F2A;"></div></div>';

      var { data, error } = await sbPublic
        .from('kori_menu_categories')
        .select('*')
        .order('sort_order', { ascending: true });

      if (error) { toast('Failed to load categories: ' + error.message, 'error'); return; }
      categories = data || [];

      tabsEl.innerHTML = '<button class="cat-tab" data-slug="__orders__">Orders</button>' +
        categories.map(function (cat) {
          return '<button class="cat-tab" data-slug="' + esc(cat.slug) + '">' + esc(cat.name) + '</button>';
        }).join('');

      tabsEl.querySelectorAll('.cat-tab').forEach(function (btn) {
        btn.addEventListener('click', function () {
          selectCategory(btn.dataset.slug);
        });
      });

      selectCategory('__orders__');
    }

    function selectCategory(slug) {
      currentCatSlug = slug;
      document.querySelectorAll('.cat-tab').forEach(function (t) {
        t.classList.toggle('active', t.dataset.slug === slug);
      });

      if (slug === '__orders__') {
        document.getElementById('menu-panel').style.display = 'none';
        document.getElementById('orders-panel').style.display = 'block';
        loadOrders();
        subscribeToOrders();
        return;
      }

      unsubscribeFromOrders();
      if (ordersInterval) { clearInterval(ordersInterval); ordersInterval = null; }
      document.getElementById('orders-panel').style.display = 'none';
      document.getElementById('menu-panel').style.display = 'block';
      var cat = categories.find(function (c) { return c.slug === slug; });
      document.getElementById('section-title').textContent = cat ? cat.name : 'Items';
      loadItems(slug);
    }

    /* ── Items ─────────────────────────────────────────── */
    async function loadItems(slug) {
      var wrap = document.getElementById('items-wrap');
      wrap.innerHTML = '<div class="spinner-wrap"><div class="spinner"></div></div>';

      var { data, error } = await sbPublic
        .from('kori_menu_items')
        .select('*')
        .eq('category_slug', slug)
        .order('sort_order', { ascending: true });

      if (error) { toast('Failed to load items: ' + error.message, 'error'); return; }
      currentItems = data || [];
      renderItemsTable(currentItems);
    }

    function renderItemsTable(items) {
      var wrap = document.getElementById('items-wrap');
      if (items.length === 0) {
        wrap.innerHTML = '<div class="empty-state">No items in this category yet. Click "+ Add Item" to get started.</div>';
        return;
      }
      wrap.innerHTML = '<table>' +
        '<thead><tr>' +
        '<th>Name</th>' +
        '<th class="col-mobile-hide">Description</th>' +
        '<th class="col-mobile-hide">Price</th>' +
        '<th>Available</th>' +
        '<th>Actions</th>' +
        '</tr></thead>' +
        '<tbody>' +
        items.map(function (item) {
          return '<tr data-id="' + esc(item.id) + '">' +
            '<td class="td-name">' + (item.image_url ? '<img class="item-thumb" src="' + esc(item.image_url) + '" alt="" />' : '') + esc(item.name) + '</td>' +
            '<td class="td-desc">' + esc(item.description || '') + '</td>' +
            '<td class="td-price">' + (item.price != null ? '$' + parseFloat(item.price).toFixed(2) : '—') + '</td>' +
            '<td><label class="toggle toggle-wrap"><input type="checkbox" class="avail-toggle" data-id="' + esc(item.id) + '" ' + (item.available ? 'checked' : '') + ' /><span class="toggle-slider"></span></label></td>' +
            '<td class="td-actions"><span class="actions-wrap">' +
              '<button class="action-btn edit-btn" data-id="' + esc(item.id) + '">Edit</button>' +
              '<button class="action-btn delete-btn" data-id="' + esc(item.id) + '">Delete</button>' +
            '</span></td>' +
            '</tr>';
        }).join('') +
        '</tbody></table>';

      wrap.querySelectorAll('.avail-toggle').forEach(function (chk) {
        chk.addEventListener('change', function () {
          toggleAvailable(chk.dataset.id, chk.checked);
        });
      });

      wrap.querySelectorAll('.edit-btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var item = currentItems.find(function (i) { return i.id === btn.dataset.id; });
          if (item) openEditModal(item);
        });
      });

      wrap.querySelectorAll('.delete-btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
          showDeleteConfirm(btn);
        });
      });
    }

    async function toggleAvailable(id, val) {
      var { error } = await sb
        .from('kori_menu_items')
        .update({ available: val })
        .eq('id', id);
      if (error) {
        toast('Failed to update: ' + error.message, 'error');
        var chk = document.querySelector('.avail-toggle[data-id="' + id + '"]');
        if (chk) chk.checked = !val;
      } else {
        var item = currentItems.find(function (i) { return i.id === id; });
        if (item) item.available = val;
        toast('Availability updated', 'success');
      }
    }

    function showDeleteConfirm(btn) {
      var id = btn.dataset.id;
      var actionsWrap = btn.closest('.actions-wrap');
      actionsWrap.innerHTML = '<span class="delete-confirm">' +
        '<span>Really delete?</span>' +
        '<button class="dc-cancel">Cancel</button>' +
        '<button class="dc-confirm">Delete</button>' +
        '</span>';
      actionsWrap.querySelector('.dc-cancel').addEventListener('click', function () {
        actionsWrap.innerHTML = '<button class="action-btn edit-btn" data-id="' + esc(id) + '">Edit</button>' +
          '<button class="action-btn delete-btn" data-id="' + esc(id) + '">Delete</button>';
        actionsWrap.querySelector('.edit-btn').addEventListener('click', function () {
          var item = currentItems.find(function (i) { return i.id === id; });
          if (item) openEditModal(item);
        });
        actionsWrap.querySelector('.delete-btn').addEventListener('click', function () {
          showDeleteConfirm(actionsWrap.querySelector('.delete-btn'));
        });
      });
      actionsWrap.querySelector('.dc-confirm').addEventListener('click', function () {
        deleteItem(id);
      });
    }

    async function deleteItem(id) {
      var { error } = await sb.from('kori_menu_items').delete().eq('id', id);
      if (error) {
        toast('Delete failed: ' + error.message, 'error');
      } else {
        toast('Item deleted', 'success');
        currentItems = currentItems.filter(function (i) { return i.id !== id; });
        renderItemsTable(currentItems);
      }
    }

    /* ── Orders ─────────────────────────────────────────── */
    async function loadOrders() {
      var wrap = document.getElementById('orders-wrap');
      wrap.innerHTML = '<div class="spinner-wrap"><div class="spinner"></div></div>';

      var { data, error } = await sb
        .from('kori_orders')
        .select('*')
        .order('created_at', { ascending: false })
        .limit(200);

      if (error) { toast('Failed to load orders: ' + error.message, 'error'); return; }
      allOrders = data || [];
      renderAnalytics(allOrders);
      renderFilteredOrders();
      wireOrdersToolbar();
    }

    async function refreshOrdersQuietly() {
      var { data, error } = await sb
        .from('kori_orders')
        .select('*')
        .order('created_at', { ascending: false })
        .limit(200);
      if (error) return;
      allOrders = data || [];
      renderAnalytics(allOrders);
      renderFilteredOrders();
    }

    function subscribeToOrders() {
      if (ordersChannel) return;
      ordersChannel = sb.channel('kori-orders-rt')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'kori_orders' }, function () {
          refreshOrdersQuietly();
        })
        .subscribe();
    }

    function unsubscribeFromOrders() {
      if (ordersChannel) { sb.removeChannel(ordersChannel); ordersChannel = null; }
    }

    function wireOrdersToolbar() {
      var searchInput = document.getElementById('order-search');
      if (searchInput && !searchInput.dataset.wired) {
        searchInput.dataset.wired = '1';
        searchInput.addEventListener('input', function () {
          orderSearch = searchInput.value.trim().toLowerCase();
          renderFilteredOrders();
        });
      }
      var filterTabs = document.querySelectorAll('.status-filter-tab');
      filterTabs.forEach(function (tab) {
        if (tab.dataset.wired) return;
        tab.dataset.wired = '1';
        tab.addEventListener('click', function () {
          orderStatusFilter = tab.dataset.filter;
          filterTabs.forEach(function (t) { t.classList.toggle('active', t.dataset.filter === orderStatusFilter); });
          renderFilteredOrders();
        });
      });
    }

    function renderAnalytics(orders) {
      var todayStr = new Date().toDateString();
      var todayOrders = orders.filter(function (o) { return new Date(o.created_at).toDateString() === todayStr; });
      // Revenue counts orders collected today (by updated_at — when cash was actually paid)
      var revenue = orders
        .filter(function (o) {
          return o.status === 'collected' &&
                 new Date(o.updated_at || o.created_at).toDateString() === todayStr;
        })
        .reduce(function (s, o) { return s + parseFloat(o.total || 0); }, 0);
      var active = orders.filter(function (o) { return ['new','confirmed','preparing'].indexOf(o.status) !== -1; }).length;
      var ready  = orders.filter(function (o) { return o.status === 'ready'; }).length;
      var el = function (id) { return document.getElementById(id); };
      if (el('stat-today'))   el('stat-today').textContent   = todayOrders.length;
      if (el('stat-revenue')) el('stat-revenue').textContent = '$' + revenue.toFixed(2);
      if (el('stat-active'))  el('stat-active').textContent  = active;
      if (el('stat-ready'))   el('stat-ready').textContent   = ready;
    }

    function renderFilteredOrders() {
      var filtered = allOrders.filter(function (o) {
        var matchStatus = !orderStatusFilter || o.status === orderStatusFilter;
        var matchSearch = !orderSearch ||
          o.id.toLowerCase().includes(orderSearch) ||
          (o.customer_name || '').toLowerCase().includes(orderSearch) ||
          (o.customer_phone || '').toLowerCase().includes(orderSearch);
        return matchStatus && matchSearch;
      });
      renderOrdersTable(filtered);
    }

    function renderOrdersTable(orders) {
      var wrap = document.getElementById('orders-wrap');
      if (orders.length === 0) {
        wrap.innerHTML = '<div class="empty-state" style="background:#fff;border:1px solid rgba(74,95,42,0.12);border-radius:4px;">No orders match this filter.</div>';
        return;
      }

      // Pre-compute per-order display data
      var rows = orders.map(function (order) {
        var dt = new Date(order.created_at);
        var timeStr = dt.toLocaleTimeString('en-ZW', { hour: '2-digit', minute: '2-digit' });
        var dateStr = dt.toLocaleDateString('en-ZW', { day: 'numeric', month: 'short' });
        var items = Array.isArray(order.items) ? order.items : [];
        var summary = items.map(function (i) { return (i.qty || 1) + '× ' + i.name; }).join(', ');
        var summaryShort = summary.length > 50 ? summary.slice(0, 47) + '…' : summary;
        var totalStr = '$' + parseFloat(order.total || 0).toFixed(2);
        var badge = '<span class="status-badge status-' + esc(order.status) + '">' + esc(order.status) + '</span>';
        var actions = getStatusActions(order);
        return { o: order, timeStr: timeStr, dateStr: dateStr, summary: summary, summaryShort: summaryShort, totalStr: totalStr, badge: badge, actions: actions };
      });

      // Desktop: scrollable table
      var desktopHtml = '<div class="orders-desktop"><div class="orders-table-inner"><table>' +
        '<thead><tr><th>Time</th><th>Order #</th><th>Customer</th><th>Phone</th>' +
        '<th>Items</th><th>Total</th><th>Pickup</th><th>Status</th><th>Actions</th>' +
        '</tr></thead><tbody>' +
        rows.map(function (r) {
          return '<tr data-order-id="' + esc(r.o.id) + '">' +
            '<td style="white-space:nowrap;font-size:0.78rem;">' + esc(r.timeStr) + '<br><span style="font-size:0.67rem;color:rgba(47,61,28,0.4)">' + esc(r.dateStr) + '</span></td>' +
            '<td style="font-family:\'Cinzel\',serif;font-size:0.75rem;white-space:nowrap;">' + esc(r.o.id) + '</td>' +
            '<td style="font-weight:500;white-space:nowrap;">' + esc(r.o.customer_name) + '</td>' +
            '<td style="font-size:0.78rem;white-space:nowrap;">' + esc(r.o.customer_phone) + '</td>' +
            '<td class="order-items-cell" title="' + esc(r.summary) + '">' + esc(r.summaryShort) + '</td>' +
            '<td style="font-family:\'Cinzel\',serif;white-space:nowrap;">' + r.totalStr + '</td>' +
            '<td style="white-space:nowrap;font-size:0.78rem;">' + esc(r.o.pickup_time || '—') + '</td>' +
            '<td>' + r.badge + '</td>' +
            '<td class="td-actions"><span class="actions-wrap">' + r.actions + '</span></td>' +
            '</tr>';
        }).join('') +
        '</tbody></table></div></div>';

      // Mobile: card layout — all info visible, action buttons front and centre
      var mobileHtml = '<div class="orders-mobile">' +
        rows.map(function (r) {
          var phone = (r.o.customer_phone || '').replace(/\D/g, '');
          return '<div class="order-card">' +
            '<div class="order-card-top">' +
              '<div>' +
                '<div class="order-card-name">' + esc(r.o.customer_name) + '</div>' +
                '<div class="order-card-ref">' + esc(r.o.id) + '</div>' +
              '</div>' +
              r.badge +
            '</div>' +
            '<div class="order-card-meta">' +
              esc(r.timeStr) + ' &middot; ' + esc(r.dateStr) +
              ' &middot; Pickup <strong>' + esc(r.o.pickup_time || '—') + '</strong>' +
              '<br><a href="tel:+' + esc(phone) + '" style="color:#4A5F2A;text-decoration:none;">' + esc(r.o.customer_phone) + '</a>' +
            '</div>' +
            '<div class="order-card-items">' + esc(r.summaryShort) + '</div>' +
            '<div class="order-card-footer">' +
              '<span class="order-card-total">' + r.totalStr + '</span>' +
              '<div class="order-card-actions">' + r.actions + '</div>' +
            '</div>' +
          '</div>';
        }).join('') +
        '</div>';

      wrap.innerHTML = desktopHtml + mobileHtml;

      wrap.querySelectorAll('.status-action-btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var order = allOrders.find(function (o) { return o.id === btn.dataset.orderId; });
          if (order) updateOrderStatus(order, btn.dataset.newStatus);
        });
      });
      wrap.querySelectorAll('.wa-notify-btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var order = allOrders.find(function (o) { return o.id === btn.dataset.orderId; });
          if (order) sendCustomerWA(order, btn.dataset.waStatus);
        });
      });
    }

    function getStatusActions(order) {
      var id = esc(order.id);
      var wa = function (status, label) {
        return '<button class="wa-notify-btn" data-order-id="' + id + '" data-wa-status="' + status + '">' +
          '<svg width="11" height="11" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>' +
          label + '</button>';
      };
      if (order.status === 'new') {
        return '<button class="status-action-btn" data-order-id="' + id + '" data-new-status="confirmed">Confirm</button>' +
               '<button class="status-action-btn status-action-cancel" data-order-id="' + id + '" data-new-status="cancelled">Cancel</button>';
      }
      if (order.status === 'confirmed') {
        return '<button class="status-action-btn" data-order-id="' + id + '" data-new-status="preparing">Preparing</button>' +
               '<button class="status-action-btn status-action-cancel" data-order-id="' + id + '" data-new-status="cancelled">Cancel</button>';
      }
      if (order.status === 'preparing') {
        return '<button class="status-action-btn" data-order-id="' + id + '" data-new-status="ready">Mark Ready</button>' +
               '<button class="status-action-btn status-action-cancel" data-order-id="' + id + '" data-new-status="cancelled">Cancel</button>';
      }
      if (order.status === 'ready') {
        return wa('ready', 'Notify Ready') +
               '<button class="status-action-btn" data-order-id="' + id + '" data-new-status="collected">Collected ✓</button>';
      }
      return '';
    }

    function customerWAMessage(order, status) {
      var name = order.customer_name;
      var id   = order.id;
      var pickup = order.pickup_time || '';
      if (status === 'confirmed') {
        return 'Hi ' + name + '! 🌿 Your Köri Studio order *' + id + '* has been confirmed.\n' +
               'Estimated pickup: *' + pickup + '*\nWe\'ll message you when it\'s ready!';
      }
      if (status === 'ready') {
        return 'Hi ' + name + '! ✅ Your order *' + id + '* is *ready for collection!*\n' +
               'Come pick it up at Köri Studio 📍 16 Francis Warren, Ilanda, Bulawayo.';
      }
      if (status === 'cancelled') {
        return 'Hi ' + name + ', we\'re sorry — your Köri Studio order *' + id + '* had to be cancelled. Please contact us at +263 775 090 455.';
      }
      return null;
    }

    function sendCustomerWA(order, status) {
      var msg = customerWAMessage(order, status);
      if (!msg) return;
      var phone = (order.customer_phone || '').replace(/\D/g, '');
      window.open('https://wa.me/' + phone + '?text=' + encodeURIComponent(msg), '_blank');
    }

    async function updateOrderStatus(order, newStatus) {
      var { error } = await sb
        .from('kori_orders')
        .update({ status: newStatus, updated_at: new Date().toISOString() })
        .eq('id', order.id);
      if (error) {
        toast('Update failed: ' + error.message, 'error');
        return;
      }
      toast('Order ' + order.id + ' → ' + newStatus, 'success');
      // Auto-send WhatsApp to customer on confirm, ready, or cancel
      if (['confirmed', 'ready', 'cancelled'].indexOf(newStatus) !== -1) {
        sendCustomerWA(order, newStatus);
      }
      refreshOrdersQuietly();
    }

    /* ── Photo upload ──────────────────────────────────── */
    var fCurrentFile     = null;
    var fCurrentImageUrl = null;
    var fRemovePhoto     = false;

    function renderPhotoWidget(url) {
      var wrap = document.getElementById('photo-wrap');
      if (!url) {
        wrap.innerHTML = '<div class="photo-upload-zone" id="photo-zone">' +
          '<svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="margin:0 auto 0.35rem;display:block;opacity:0.4"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>' +
          'Click to add a photo</div>';
        document.getElementById('photo-zone').addEventListener('click', function () {
          document.getElementById('f-photo').click();
        });
      } else {
        wrap.innerHTML = '<img class="photo-preview-img" src="' + esc(url) + '" alt="Preview" />' +
          '<div class="photo-actions">' +
            '<button type="button" class="action-btn edit-btn" id="photo-change-btn">Change</button>' +
            '<button type="button" class="action-btn delete-btn" id="photo-remove-btn">Remove Photo</button>' +
          '</div>';
        document.getElementById('photo-change-btn').addEventListener('click', function () {
          document.getElementById('f-photo').click();
        });
        document.getElementById('photo-remove-btn').addEventListener('click', function () {
          fRemovePhoto = true;
          fCurrentFile = null;
          renderPhotoWidget(null);
        });
      }
    }

    function resetPhotoState() {
      fCurrentFile = null; fCurrentImageUrl = null; fRemovePhoto = false;
      renderPhotoWidget(null);
    }

    document.getElementById('f-photo').addEventListener('change', function (e) {
      var file = e.target.files[0];
      if (!file) return;
      if (file.size > 5 * 1024 * 1024) { toast('Photo must be under 5 MB', 'error'); return; }
      fCurrentFile = file;
      fRemovePhoto = false;
      var reader = new FileReader();
      reader.onload = function (ev) { renderPhotoWidget(ev.target.result); };
      reader.readAsDataURL(file);
      e.target.value = '';
    });

    /* ── Modal ─────────────────────────────────────────── */
    var modalOverlay = document.getElementById('modal-overlay');
    var modalTitle   = document.getElementById('modal-title');
    var fId          = document.getElementById('f-id');
    var fName        = document.getElementById('f-name');
    var fDesc        = document.getElementById('f-desc');
    var fPrice       = document.getElementById('f-price');
    var fSort        = document.getElementById('f-sort');
    var fDisplayType = document.getElementById('f-display-type');
    var fPillGroup   = document.getElementById('f-pill-group');
    var fSubcat      = document.getElementById('f-subcategory');
    var fAvailable   = document.getElementById('f-available');
    var saveBtn      = document.getElementById('modal-save-btn');

    function openAddModal() {
      modalTitle.textContent = 'Add Item';
      fId.value = '';
      fName.value = '';
      fDesc.value = '';
      fPrice.value = '';
      fSort.value = '';
      fDisplayType.value = 'standard';
      fPillGroup.value = '';
      fSubcat.value = '';
      fAvailable.checked = true;
      resetPhotoState();
      saveBtn.disabled = false;
      saveBtn.textContent = 'Save Item';
      modalOverlay.classList.add('open');
      fName.focus();
    }

    function openEditModal(item) {
      modalTitle.textContent = 'Edit Item';
      fId.value = item.id || '';
      fName.value = item.name || '';
      fDesc.value = item.description || '';
      fPrice.value = item.price != null ? item.price : '';
      fSort.value = item.sort_order != null ? item.sort_order : '';
      fDisplayType.value = item.display_type || 'standard';
      fPillGroup.value = item.pill_group || '';
      fSubcat.value = item.subcategory || '';
      fAvailable.checked = item.available !== false;
      fCurrentFile = null;
      fRemovePhoto = false;
      fCurrentImageUrl = item.image_url || null;
      renderPhotoWidget(item.image_url || null);
      saveBtn.disabled = false;
      saveBtn.textContent = 'Save Item';
      modalOverlay.classList.add('open');
      fName.focus();
    }

    function closeModal() {
      modalOverlay.classList.remove('open');
    }

    document.getElementById('modal-close-btn').addEventListener('click', closeModal);
    document.getElementById('modal-cancel-btn').addEventListener('click', closeModal);
    modalOverlay.addEventListener('click', function (e) {
      if (e.target === modalOverlay) closeModal();
    });
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && modalOverlay.classList.contains('open')) closeModal();
    });

    document.getElementById('add-item-btn').addEventListener('click', openAddModal);

    saveBtn.addEventListener('click', async function () {
      var name = fName.value.trim();
      if (!name) { fName.focus(); toast('Name is required', 'error'); return; }
      if (!currentCatSlug) { toast('No category selected', 'error'); return; }

      saveBtn.disabled = true;
      saveBtn.textContent = 'Saving…';

      // Resolve image URL before saving
      var imageUrl = fCurrentImageUrl;
      if (fRemovePhoto) {
        if (fCurrentImageUrl) {
          var oldSeg = fCurrentImageUrl.split('/menu-images/')[1];
          if (oldSeg) sb.storage.from('menu-images').remove([oldSeg]);
        }
        imageUrl = null;
      } else if (fCurrentFile) {
        saveBtn.textContent = 'Uploading photo…';
        var ext = (fCurrentFile.name.split('.').pop() || 'jpg').toLowerCase();
        var fname = Date.now() + '-' + Math.random().toString(36).slice(2) + '.' + ext;
        var upRes = await sb.storage.from('menu-images').upload(fname, fCurrentFile, { contentType: fCurrentFile.type });
        if (upRes.error) {
          toast('Photo upload failed: ' + upRes.error.message, 'error');
          saveBtn.disabled = false; saveBtn.textContent = 'Save Item';
          return;
        }
        if (fCurrentImageUrl) {
          var oldSeg2 = fCurrentImageUrl.split('/menu-images/')[1];
          if (oldSeg2) sb.storage.from('menu-images').remove([oldSeg2]);
        }
        imageUrl = sb.storage.from('menu-images').getPublicUrl(fname).data.publicUrl;
        saveBtn.textContent = 'Saving…';
      }

      var payload = {
        category_slug: currentCatSlug,
        name: name,
        description: fDesc.value.trim() || null,
        price: fPrice.value !== '' ? parseFloat(fPrice.value) : null,
        display_type: fDisplayType.value || 'standard',
        pill_group: fPillGroup.value.trim() || null,
        subcategory: fSubcat.value.trim() || null,
        available: fAvailable.checked,
        sort_order: fSort.value !== '' ? parseInt(fSort.value, 10) : 0,
        image_url: imageUrl
      };

      var id = fId.value.trim();
      var dbRes;
      if (id) {
        dbRes = await sb.from('kori_menu_items').update(payload).eq('id', id);
      } else {
        dbRes = await sb.from('kori_menu_items').insert(payload);
      }

      if (dbRes.error) {
        toast('Save failed: ' + dbRes.error.message, 'error');
        console.error('DB error:', dbRes.error);
        saveBtn.disabled = false;
        saveBtn.textContent = 'Save Item';
      } else {
        toast(id ? 'Item updated' : 'Item added', 'success');
        closeModal();
        loadItems(currentCatSlug);
      }
    });

  })();
  </script>
</body>
</html>
